name: map_runtime
description: >-
  Read-only Flame viewer for maps created with the RPG Map Editor format.
  Loads a project.json, resolves tileset assets, and renders
  tile, terrain, path, entity and collision layers in a Flame scene.
version: 0.1.0

repository: https://git.yoahn.me/yoahn/pokemonProject.git

topics:
  - game
  - map
  - flame
  - rpg

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.36.0
  path: ^1.8.3
  map_core:
    path: ../map_core
  map_gameplay:
    path: ../map_gameplay

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

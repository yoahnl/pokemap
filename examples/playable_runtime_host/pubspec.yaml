name: playable_runtime_host
description: Standalone consumer example for map_runtime — loads a project.json and runs a playable Flame map.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.35.0
  file_selector: ^1.0.3
  flutter_joystick: ^0.2.2
  gamepads: ^0.1.10+1
  path_provider: ^2.1.0
  path: ^1.9.0
  map_core:
    path: ../../packages/map_core
  map_gameplay:
    path: ../../packages/map_gameplay
  map_runtime:
    path: ../../packages/map_runtime

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  config:
    enable-swift-package-manager: false
